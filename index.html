<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Signal App</title>

<style>

body{
background:#0f172a;
font-family:Arial;
color:white;
margin:0;
padding:20px;
}

h1{
text-align:center;
margin-bottom:30px;
font-size:40px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:25px;
margin-bottom:30px;
}

.title{
font-size:36px;
font-weight:bold;
text-align:center;
margin-bottom:15px;
}

iframe{
width:100%;
height:500px;
border:none;
border-radius:20px;
}

.timer{
font-size:30px;
text-align:center;
margin-top:15px;
color:#22c55e;
font-weight:bold;
}

</style>

</head>

<body>

<h1>🚀 SIGNAL APP</h1>

<div class="card">

<div class="title">
📈 BTCUSDT
</div>

<iframe src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:BTCUSDT&interval=5&theme=dark"></iframe>

<div class="timer" id="timer1">
⏳ Loading...
</div>

</div>

<div class="card">

<div class="title">
📈 ETHUSDT
</div>

<iframe src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:ETHUSDT&interval=5&theme=dark"></iframe>

<div class="timer" id="timer2">
⏳ Loading...
</div>

</div>

<div class="card">

<div class="title">
📈 SOLUSDT
</div>

<iframe src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:SOLUSDT&interval=5&theme=dark"></iframe>

<div class="timer" id="timer3">
⏳ Loading...
</div>

</div>

<div class="card">

<div class="title">
📈 BNBUSDT
</div>

<iframe src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:BNBUSDT&interval=5&theme=dark"></iframe>

<div class="timer" id="timer4">
⏳ Loading...
</div>

</div>

<script>

function updateTimers(){

const now = new Date();

const minutes = now.getMinutes();

const seconds = now.getSeconds();

const remainMinutes = 4 - (minutes % 5);

const remainSeconds = 59 - seconds;

const text =
"⏳ Փակվելուն մնաց → " +
remainMinutes +
":" +
String(remainSeconds).padStart(2,'0');

document.getElementById("timer1").innerHTML = text;
document.getElementById("timer2").innerHTML = text;
document.getElementById("timer3").innerHTML = text;
document.getElementById("timer4").innerHTML = text;

}

setInterval(updateTimers,1000);

updateTimers();

</script>

</body>
</html>
