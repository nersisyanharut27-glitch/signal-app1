<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Signal App</title>

<style>

body{
    background:#0f172a;
    color:white;
    font-family:Arial;
    margin:0;
    padding:15px;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.grid{
    display:grid;
    grid-template-columns:1fr;
    gap:20px;
}

.card{
    background:#1e293b;
    border-radius:15px;
    overflow:hidden;
    padding:10px;
}

iframe{
    width:100%;
    height:500px;
    border:none;
    border-radius:10px;
}

.pair{
    font-size:22px;
    margin-bottom:10px;
    text-align:center;
}

</style>
</head>

<body>

<h1>🚀 ULTRA SIGNAL APP</h1>

<div class="grid">

<div class="card">
<div class="pair">BTCUSDT</div>
<iframe src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:BTCUSDT&interval=5"></iframe>
</div>

<div class="card">
<div class="pair">ETHUSDT</div>
<iframe src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:ETHUSDT&interval=5"></iframe>
</div>

<div class="card">
<div class="pair">SOLUSDT</div>
<iframe src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:SOLUSDT&interval=5"></iframe>
</div>

<div class="card">
<div class="pair">BNBUSDT</div>
<iframe src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:BNBUSDT&interval=5"></iframe>
</div>

<div class="card">
<div class="pair">XRPUSDT</div>
<iframe src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:XRPUSDT&interval=5"></iframe>
</div>

<div class="card">
<div class="pair">DOGEUSDT</div>
<iframe src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:DOGEUSDT&interval=5"></iframe>
</div>

</div>

</body>
</html>
