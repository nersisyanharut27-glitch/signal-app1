<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Signal Charts</title>

<style>
body{
    background:#111;
    margin:0;
    padding:10px;
    color:white;
    font-family:sans-serif;
}

.chart{
    margin-bottom:20px;
    border-radius:15px;
    overflow:hidden;
}
</style>

</head>

<body>

<div id="charts"></div>

<script>

const params = new URLSearchParams(window.location.search);

const pairs = params.get("pairs");

const container = document.getElementById("charts");

if(pairs){

    const allPairs = pairs.split(",");

    allPairs.forEach(pair => {

        const div = document.createElement("div");

        div.className = "chart";

        div.innerHTML = `
        <iframe
        src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:${pair}&interval=5&theme=dark"
        width="100%"
        height="500"
        frameborder="0">
        </iframe>
        `;

        container.appendChild(div);

    });

}

</script>

</body>
</html>
