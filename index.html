<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Signal App</title>

<script src="https://s3.tradingview.com/tv.js"></script>

<style>

body{
    margin:0;
    padding:8px;
    background:#0f172a;
    font-family:Arial;
    color:white;
}

.card{
    background:#1e293b;
    border-radius:16px;
    padding:8px;
    margin-bottom:10px;
}

.title{
    text-align:center;
    font-size:18px;
    font-weight:bold;
    margin-bottom:6px;
}

.graph{
    width:100%;
    height:170px;
    border-radius:12px;
    overflow:hidden;
}

.timer{
    margin-top:6px;
    text-align:center;
    font-size:15px;
    font-weight:bold;
    color:#22c55e;
}

</style>
</head>

<body>

<div class="card">
    <div class="title">BTCUSDT</div>
    <div id="btc_graph" class="graph"></div>
    <div class="timer" id="timer"></div>
</div>

<div class="card">
    <div class="title">ETHUSDT</div>
    <div id="eth_graph" class="graph"></div>
    <div class="timer" id="timer2"></div>
</div>

<div class="card">
    <div class="title">SOLUSDT</div>
    <div id="sol_graph" class="graph"></div>
    <div class="timer" id="timer3"></div>
</div>

<div class="card">
    <div class="title">BNBUSDT</div>
    <div id="bnb_graph" class="graph"></div>
    <div class="timer" id="timer4"></div>
</div>

<div class="card">
    <div class="title">XRPUSDT</div>
    <div id="xrp_graph" class="graph"></div>
    <div class="timer" id="timer5"></div>
</div>

<div class="card">
    <div class="title">DOGEUSDT</div>
    <div id="doge_graph" class="graph"></div>
    <div class="timer" id="timer6"></div>
</div>

<script>

function updateTimers(){

    const now = new Date()

    const seconds =
        now.getUTCMinutes() * 60 +
        now.getUTCSeconds()

    let remaining = 300 - (seconds % 300)

    if(remaining === 300){
        remaining = 0
    }

    const mins = Math.floor(remaining / 60)
    const secs = remaining % 60

    const text =
        "⏰ " +
        String(mins).padStart(2,'0') +
        ":" +
        String(secs).padStart(2,'0')

    document.getElementById("timer").innerHTML = text
    document.getElementById("timer2").innerHTML = text
    document.getElementById("timer3").innerHTML = text
    document.getElementById("timer4").innerHTML = text
    document.getElementById("timer5").innerHTML = text
    document.getElementById("timer6").innerHTML = text
}

setInterval(updateTimers,1000)

updateTimers()

function createChart(symbol,id){

    new TradingView.widget({

        "autosize": true,
        "symbol": symbol,
        "interval": "5",
        "theme": "dark",
        "style": "1",

        "hide_top_toolbar": true,
        "hide_legend": true,

        "enable_publishing": false,
        "allow_symbol_change": false,

        "disabled_features": [
            "left_toolbar",
            "header_symbol_search",
            "header_compare",
            "header_undo_redo",
            "header_screenshot",
            "header_fullscreen_button",
            "display_market_status",
            "control_bar",
            "edit_buttons_in_legend",
            "context_menus",
            "volume_force_overlay"
        ],

        "container_id": id

    })

}

createChart("BINANCE:BTCUSDT","btc_graph")
createChart("BINANCE:ETHUSDT","eth_graph")
createChart("BINANCE:SOLUSDT","sol_graph")
createChart("BINANCE:BNBUSDT","bnb_graph")
createChart("BINANCE:XRPUSDT","xrp_graph")
createChart("BINANCE:DOGEUSDT","doge_graph")

</script>

</body>
</html>
