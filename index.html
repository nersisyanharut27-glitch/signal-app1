<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Signal App</title>

<script src="https://s3.tradingview.com/tv.js"></script>

<style>

body{
    margin:0;
    padding:10px;
    background:#0f172a;
    font-family:Arial;
    color:white;
}

.card{
    background:#1e293b;
    border-radius:18px;
    padding:10px;
    margin-bottom:12px;
}

.title{
    text-align:center;
    font-size:22px;
    font-weight:bold;
    margin-bottom:8px;
}

.graph{
    width:100%;
    height:220px;
    border-radius:14px;
    overflow:hidden;
}

.timer{
    margin-top:8px;
    text-align:center;
    font-size:18px;
    font-weight:bold;
    color:#22c55e;
}

</style>
</head>

<body>

<!-- BTC -->

<div class="card">
    <div class="title">BTCUSDT</div>
    <div id="btc_graph" class="graph"></div>
    <div class="timer" id="timer"></div>
</div>

<!-- ETH -->

<div class="card">
    <div class="title">ETHUSDT</div>
    <div id="eth_graph" class="graph"></div>
    <div class="timer" id="timer2"></div>
</div>

<!-- SOL -->

<div class="card">
    <div class="title">SOLUSDT</div>
    <div id="sol_graph" class="graph"></div>
    <div class="timer" id="timer3"></div>
</div>

<!-- BNB -->

<div class="card">
    <div class="title">BNBUSDT</div>
    <div id="bnb_graph" class="graph"></div>
    <div class="timer" id="timer4"></div>
</div>

<!-- XRP -->

<div class="card">
    <div class="title">XRPUSDT</div>
    <div id="xrp_graph" class="graph"></div>
    <div class="timer" id="timer5"></div>
</div>

<!-- DOGE -->

<div class="card">
    <div class="title">DOGEUSDT</div>
    <div id="doge_graph" class="graph"></div>
    <div class="timer" id="timer6"></div>
</div>

<script>

function updateTimers(){

    const now = new Date()

    const seconds =
        now.getUTCMinutes() * 60 +
        now.getUTCSeconds()

    let remaining = 300 - (seconds % 300)

    if(remaining === 300){
        remaining = 0
    }

    const mins = Math.floor(remaining / 60)
    const secs = remaining % 60

    const text =
        "⏰ " +
        String(mins).padStart(2,'0') +
        ":" +
        String(secs).padStart(2,'0')

    document.getElementById("timer").innerHTML = text
    document.getElementById("timer2").innerHTML = text
    document.getElementById("timer3").innerHTML = text
    document.getElementById("timer4").innerHTML = text
    document.getElementById("timer5").innerHTML = text
    document.getElementById("timer6").innerHTML = text
}

setInterval(updateTimers,1000)

updateTimers()

new TradingView.widget({
    "autosize": true,
    "symbol": "BINANCE:BTCUSDT",
    "interval": "5",
    "theme": "dark",
    "style": "1",
    "hide_top_toolbar": true,
    "hide_legend": true,
    "container_id": "btc_graph"
})

new TradingView.widget({
    "autosize": true,
    "symbol": "BINANCE:ETHUSDT",
    "interval": "5",
    "theme": "dark",
    "style": "1",
    "hide_top_toolbar": true,
    "hide_legend": true,
    "container_id": "eth_graph"
})

new TradingView.widget({
    "autosize": true,
    "symbol": "BINANCE:SOLUSDT",
    "interval": "5",
    "theme": "dark",
    "style": "1",
    "hide_top_toolbar": true,
    "hide_legend": true,
    "container_id": "sol_graph"
})

new TradingView.widget({
    "autosize": true,
    "symbol": "BINANCE:BNBUSDT",
    "interval": "5",
    "theme": "dark",
    "style": "1",
    "hide_top_toolbar": true,
    "hide_legend": true,
    "container_id": "bnb_graph"
})

new TradingView.widget({
    "autosize": true,
    "symbol": "BINANCE:XRPUSDT",
    "interval": "5",
    "theme": "dark",
    "style": "1",
    "hide_top_toolbar": true,
    "hide_legend": true,
    "container_id": "xrp_graph"
})

new TradingView.widget({
    "autosize": true,
    "symbol": "BINANCE:DOGEUSDT",
    "interval": "5",
    "theme": "dark",
    "style": "1",
    "hide_top_toolbar": true,
    "hide_legend": true,
    "container_id": "doge_graph"
})

</script>

</body>
</html>
