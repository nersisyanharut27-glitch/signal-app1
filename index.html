<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Signal App</title>

<script src="https://s3.tradingview.com/tv.js"></script>

<style>

body{
    margin:0;
    padding:10px;
    background:#0f172a;
    font-family:Arial;
    color:white;
}

.card{
    background:#1e293b;
    border-radius:20px;
    padding:12px;
    margin-bottom:14px;
}

.title{
    text-align:center;
    font-size:26px;
    font-weight:bold;
    margin-bottom:10px;
}

.graph{
    width:100%;
    height:220px;
    border-radius:15px;
    overflow:hidden;
}

.timer{
    margin-top:10px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
    color:#22c55e;
}

</style>
</head>

<body>

<!-- BTC -->

<div class="card">

    <div class="title">📈 BTCUSDT</div>

    <div id="btc_graph" class="graph"></div>

    <div class="timer">
        ⏰ Փակվելու մնաց → 2:00
    </div>

</div>

<!-- ETH -->

<div class="card">

    <div class="title">📈 ETHUSDT</div>

    <div id="eth_graph" class="graph"></div>

    <div class="timer">
        ⏰ Փակվելու մնաց → 2:00
    </div>

</div>

<!-- SOL -->

<div class="card">

    <div class="title">📈 SOLUSDT</div>

    <div id="sol_graph" class="graph"></div>

    <div class="timer">
        ⏰ Փակվելու մնաց → 2:00
    </div>

</div>

<!-- BNB -->

<div class="card">

    <div class="title">📈 BNBUSDT</div>

    <div id="bnb_graph" class="graph"></div>

    <div class="timer">
        ⏰ Փակվելու մնաց → 2:00
    </div>

</div>

<!-- XRP -->

<div class="card">

    <div class="title">📈 XRPUSDT</div>

    <div id="xrp_graph" class="graph"></div>

    <div class="timer">
        ⏰ Փակվելու մնաց → 2:00
    </div>

</div>

<!-- DOGE -->

<div class="card">

    <div class="title">📈 DOGEUSDT</div>

    <div id="doge_graph" class="graph"></div>

    <div class="timer">
        ⏰ Փակվելու մնաց → 2:00
    </div>

</div>

<script>

new TradingView.widget({
    "autosize": true,
    "symbol": "BINANCE:BTCUSDT",
    "interval": "5",
    "timezone": "Etc/UTC",
    "theme": "dark",
    "style": "1",
    "locale": "en",
    "hide_top_toolbar": true,
    "hide_legend": true,
    "save_image": false,
    "container_id": "btc_graph"
});

new TradingView.widget({
    "autosize": true,
    "symbol": "BINANCE:ETHUSDT",
    "interval": "5",
    "timezone": "Etc/UTC",
    "theme": "dark",
    "style": "1",
    "locale": "en",
    "hide_top_toolbar": true,
    "hide_legend": true,
    "save_image": false,
    "container_id": "eth_graph"
});

new TradingView.widget({
    "autosize": true,
    "symbol": "BINANCE:SOLUSDT",
    "interval": "5",
    "timezone": "Etc/UTC",
    "theme": "dark",
    "style": "1",
    "locale": "en",
    "hide_top_toolbar": true,
    "hide_legend": true,
    "save_image": false,
    "container_id": "sol_graph"
});

new TradingView.widget({
    "autosize": true,
    "symbol": "BINANCE:BNBUSDT",
    "interval": "5",
    "timezone": "Etc/UTC",
    "theme": "dark",
    "style": "1",
    "locale": "en",
    "hide_top_toolbar": true,
    "hide_legend": true,
    "save_image": false,
    "container_id": "bnb_graph"
});

new TradingView.widget({
    "autosize": true,
    "symbol": "BINANCE:XRPUSDT",
    "interval": "5",
    "timezone": "Etc/UTC",
    "theme": "dark",
    "style": "1",
    "locale": "en",
    "hide_top_toolbar": true,
    "hide_legend": true,
    "save_image": false,
    "container_id": "xrp_graph"
});

new TradingView.widget({
    "autosize": true,
    "symbol": "BINANCE:DOGEUSDT",
    "interval": "5",
    "timezone": "Etc/UTC",
    "theme": "dark",
    "style": "1",
    "locale": "en",
    "hide_top_toolbar": true,
    "hide_legend": true,
    "save_image": false,
    "container_id": "doge_graph"
});

</script>

</body>
</html>
